<body>

    <main class="container" style="margin-top: 40px;">

        <h1 class="page-main-title">My Projects</h1>

        <div class="projects-grid">
           
            <div class="project-card" onclick="openProjectModal(
                'photos/Right View.jpg', 
                'WRO Future Engineering Robot', 
                '2025', 
                '<p>The World Robot Olympiads (WRO) Future Engineering category is an advanced autonomous driving competition, where participants design self-driving model cars, program navigation using computer vision, and document their engineering workflow on a public GitHub repository.</p>' +
                '<p>My team and I built an autonomous robotic vehicle designed to navigate complex obstacle tracks using computer vision. Our robot is built from LEGO and custom microcontrollers.</p>' +            
                '<p><strong>Key Highlights of the Robot:</strong></p>' +
                '<ul>' +
                '  <li>Used a custom microcontroller board, the EvolutionX1, built around the powerful ESP32-S3 chip. Enabled for seamless integration of LEGO Mindstorms Motors/Sensors and the HuskyLens.</li>' +
                '  <li>We incorporated a variety of sensors, namely the Time of Flight Distance Measurement VL53L0X Sensor, and the Inertial Measurement Unit (IMU) Compass BNO055 Sensor.</li>' +
                '  <li>Programmed using C++ and Python to enable smooth manoeuvring, as well as colour detection.</li>' +
                '  <li>Implemented a HuskyLens, coded using Python. Used for block colour detection.</li>' +
                '</ul>' +
                '<p>You may view our GitHub repository <a href=\'https://github.com/joableejieen/WRO-FE-2025\' target=\'_blank\' style=\'color: #3b8256; font-weight: 600;\'>here &rarr;</a></p>'
            )">
                <img src="photos/Right View.jpg" alt="Project 1" class="project-card-img">
                <div class="project-card-info">
                    <span class="project-card-date">2025</span>
                    <h3 class="project-card-title">WRO Future Engineering Robot</h3>
                    <p class="project-card-snippet">An autonomous vehicle engineered for obstacle navigation and computer vision tasks...</p>
                    <span class="read-more-tag">Read Details &rarr;</span>
                </div>
            </div>

            <div class="project-card" onclick="openProjectModal(
                'photos/Right View.jpg', 
                'Aero Indicator System for Vehicles', 
                '2025', 
                '<p>For the HMGICS Techbot Challenge 2025, organised by the Hyundai Motor Group Innovation Centre Singapore, I built a prototype Aero Indicator System and an Audio-Tactile Feedback System to help the visually impaired enter a vehicle on their own without any guidance.</p>' +
                '<p>Aero Indicator System: uses a fan and pipes to direct airflow outward when the car door opens. This feature clearly outlines the car door and offers feedback on the height the passenger needs to step over or how much to bend down, enhancing safety and accessibility for users.</p>' +
                '<p>Audio-tactile feedback guidance: vibration motors along the car door that activate in sequence to guide users to the door handle. An internal buzzer in the handle emits sound signals for easy identification. This combination of vibrations and sound enhances awareness for a smooth entry into the vehicle.</p>' +  
                '<p><strong>Team Design Process</strong></p>' +
                '<ul>' +
                '  <li>Kickoff with workshops on 3D printing and laser cutting, a design phase, prototype building, and a final presentation to judges at the Hyundai Motor Group Innovation Centre Singapore (HMGICS).</li>' +
                '  <li>Design phase: researched how to improve the passenger experience for individuals from diverse backgrounds.  We measured Ioniq 5 with 3D scans and tested how blind passengers get in and out to find out what is hard for them.</li>' +
                '  <li>Found that blind passengers often struggle to find door handles and risk bumping their heads while boarding.</li>' +
                '  <li>To fix this, we designed an electronic system with audio-tactile feedback to guide them to the handle, along with a clearer door frame indicator, the Aero Indicator System for safer entry.</li>' +
                '</ul>'
            )">
                <img src="photos/Right View.jpg" alt="Project 2" class="project-card-img">
                <div class="project-card-info">
                    <span class="project-card-date">2025</span>
                    <h3 class="project-card-title"></h3>
                    <p class="project-card-snippet">HMGICS Techbot Challenge Entry...</p>
                    <span class="read-more-tag">Read Details &rarr;</span>
                </div>
            </div>

            </div>
    </main>

    <div id="projectModal" class="project-modal-overlay" onclick="closeProjectModal(event)">
        <div class="project-modal-box">
            <span class="project-modal-close" onclick="closeProjectModal(event)">&times;</span>        
            <div class="project-modal-stack">
                <div class="project-modal-media-top">
                    <img id="projectModalImg" src="" alt="Project Image">
                </div>
                <div class="project-modal-text-bottom">
                    <span id="projectModalDate" class="project-date-badge"></span>
                    <h2 id="projectModalTitle"></h2>
                    <div id="projectModalDesc"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function openProjectModal(imgSrc, title, date, description) {
            document.getElementById('projectModalImg').src = imgSrc;
            document.getElementById('projectModalTitle').innerText = title;
            document.getElementById('projectModalDate').innerText = date;
            // Updated from innerText to innerHTML to support multiline HTML tags
            document.getElementById('projectModalDesc').innerHTML = description; 
            document.getElementById('projectModal').style.display = "flex";
        }

        function closeProjectModal(event) {
            // Closes modal safely if clicked cross button or directly onto dark background wrapper
            if (event.target.id === "projectModal" || event.target.classList.contains("project-modal-close")) {
                document.getElementById('projectModal').style.display = "none";
            }
        }
    </script>

</body>
</html>
